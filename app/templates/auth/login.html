<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelOeuf - Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#f8f7f4] flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-sm">
    
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="bg-yellow-500 w-16 h-16 flex items-center justify-center rounded-full text-white text-3xl font-bold shadow">B</div>
    </div>

    <h2 class="text-2xl font-bold text-gray-800 text-center mb-1">Bienvenue chez BelOeuf</h2>
    <p class="text-gray-500 text-center text-sm mb-6">Connectez-vous pour accéder au tableau de bord</p>

    <!-- Formulaire -->
    <form class="space-y-4" method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label class="block text-gray-600 text-sm mb-1" for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" required
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm">
      </div>

      <div>
        <label class="block text-gray-600 text-sm mb-1" for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm">
      </div>

      <div>
        <label class="block text-gray-600 text-sm mb-1" for="role">Rôle</label>
        <select id="role" name="role" required
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm">
          <option value="">Sélectionner un rôle</option>
          <option value="admin">Administrateur</option>
          <option value="commercial">Commercial</option>
          <option value="responsable_commercial">Responsable Commercial</option>
        </select>
      </div>

      <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-2 rounded-xl font-semibold transition text-sm">
        Connexion
      </button>
    </form>
    

  </div>

</body>

</html>
