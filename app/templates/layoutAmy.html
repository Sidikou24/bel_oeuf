<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS (important pour les modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <title>{% block title %}BelOeuf Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/beloeuf.css') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="min-h-screen flex w-full bg-background">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-circle">B</div>
                    <span class="logo-text">BelOeuf</span>
                </div>
            </div>
            <nav class="sidebar-nav">
               
                    <!-- Dashboard -->
                    <div class="nav-category">TABLEAU DE BORD</div>
                    <a href="{{ url_for('commercial.dashboard') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
                        <i data-lucide="layout-dashboard"></i>
                        <span>Vue générale</span>
                    </a>

                    <div class="nav-separator"></div>

                    <!-- Gestion commerciale -->
                    <div class="nav-category">GESTION COMMERCIALE</div>
                    <a href="{{ url_for('commercial.clients') }}" class="nav-item">
                        <i data-lucide="users"></i>
                        <span>Clients</span>
                    </a>
                    <a href="{{ url_for('commercial.sales') }}" class="nav-item">
                        <i data-lucide="shopping-cart"></i>
                        <span>Ventes</span>
                    </a>

                    <a href="{{ url_for('commercial.stock') }}" class="nav-item">
                        <i data-lucide="package"></i>
                        <span>Stock</span>
                    </a>

                    <div class="nav-separator"></div>

                    <!-- Stock -->
                    <div class="nav-category">APPROVISIONNEMENT</div>
                    <a href="{{ url_for('commercial.matieres') }}" class="nav-item">
                        <i data-lucide="package"></i>
                        <span>Matières Premières</span>
                    </a>
                    <a href="{{ url_for('commercial.purchases') }}" class="nav-item">
                        <i data-lucide="shopping-bag"></i>
                        <span>Achats</span>
                    </a>
                    
                    <a href="{{ url_for('commercial.suppliers') }}" class="nav-item">
                        <i data-lucide="truck"></i>
                        <span>Fournisseurs</span>
                    </a>

                    <div class="nav-separator"></div>

                    <!-- Rapports -->
                    <div class="nav-category"></div>
                    <a href="{{ url_for('commercial.reports') }}" class="nav-item">
                        <i data-lucide="bar-chart-3"></i>
                        <span>Rapports</span>
                    </a>

                    <div class="nav-separator"></div>

                    <!-- Configuration -->
                    <div class="nav-category">CONFIGURATION</div>
                    <a href="{{ url_for('commercial.users') }}" class="nav-item">
                        <i data-lucide="user-circle"></i>
                        <span>Utilisateurs</span>
                    </a>
                    <a href="{{ url_for('commercial.settings') }}" class="nav-item">
                        <i data-lucide="settings"></i>
                        <span>Paramètres</span>
                    </a>
            </nav>
        </aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="header-toggle" onclick="toggleSidebar()">
                        <i data-lucide="menu"></i>
                    </button>
                    <div class="search-container">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" placeholder="Rechercher..." class="search-input">
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i data-lucide="sun"></i>
                    </button>
                    <button class="notification-btn">
                        <i data-lucide="bell" style="width:20px;height:20px;color:#eab308;"></i>
                    </button>
                    <a href="{{ url_for('auth.logout') }}" class="notification-btn" title="Déconnexion" style="display:inline-flex;align-items:center;justify-content:center;">
                        <i data-lucide="log-out" style="width:20px;height:20px;color:#ef4444;"></i>
                    </a>
                    <div class="user-menu">
                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop&crop=face" alt="Avatar" class="avatar">
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-auto p-6">
                {% block content %}{% endblock %}
            </main>
            <footer class="footer" style="width:100%;background:#f8f9fa;color:#888;padding:1rem 0;text-align:center;font-size:0.95rem;margin-top:2rem;border-top:1px solid #eee;">
                <span style="font-weight:600;letter-spacing:0.04em;color:#222;">GBM Software</span>
                <span style="color:#eab308;font-weight:700;margin:0 0.3em;">✦</span>
                <span style="font-style:italic;color:#666;">L’innovation au service de BelOeuf</span>
            </footer>
        </div>
    </div>
    <script>
        // Sidebar toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // Dark mode toggle
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('dark');
            // Stocke le choix dans le localStorage
            if (isDark) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateThemeIcon(isDark);
        }

        function updateThemeIcon(isDark) {
            const themeBtn = document.querySelector('.theme-toggle i');
            if (themeBtn) {
                themeBtn.setAttribute('data-lucide', isDark ? 'moon' : 'sun');
                lucide.createIcons();
            }
        }

        // Applique le thème au chargement
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark');
                updateThemeIcon(true);
            } else {
                document.body.classList.remove('dark');
                updateThemeIcon(false);
            }
        });
    </script>
    
</body>
</html>
