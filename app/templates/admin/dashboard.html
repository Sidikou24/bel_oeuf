{% extends "base.html" %}

{% block title %}Tableau de bord Admin - BelOeuf{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Tableau de bord Administrateur</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <!-- Statistiques rapides -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h3 class="text-lg font-semibold text-gray-700 mb-2">Total Utilisateurs</h3>
            <p class="text-3xl font-bold text-blue-600">--</p>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h3 class="text-lg font-semibold text-gray-700 mb-2">Total Commandes</h3>
            <p class="text-3xl font-bold text-green-600">--</p>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h3 class="text-lg font-semibold text-gray-700 mb-2">Total Produits</h3>
            <p class="text-3xl font-bold text-purple-600">--</p>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h3 class="text-lg font-semibold text-gray-700 mb-2">Total Clients</h3>
            <p class="text-3xl font-bold text-orange-600">--</p>
        </div>
    </div>
    
    <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Actions rapides</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="{{ url_for('admin.users') }}" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md text-center">
                Gérer les utilisateurs
            </a>
            <a href="{{ url_for('admin.roles') }}" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md text-center">
                Gérer les rôles
            </a>
        </div>
    </div>
</div>
{% endblock %}
